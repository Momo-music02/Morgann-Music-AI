<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Litual OS Chat</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #2d6ea8;
      --bg: #f4f9ff;
      --sidebar: #e7f2ff;
      --bubble-user: #d6ebff;
      --bubble-ai: #edf5ff;
      --radius: 22px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg); color: #222; overflow: hidden;
    }
    body { display: flex; }
    
    /* SIDEBAR */
    .sidebar {
      width: 260px; background: var(--sidebar); border-right: 1px solid #cfe7ff;
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    .logo { font-size: 1.5em; font-weight: bold; color: var(--primary); padding: 24px; text-align: center; }
    .convos { flex: 1; overflow-y: auto; padding: 10px 0; }
    .convo-item {
      padding: 14px 20px; border: none; background: transparent; text-align: left;
      width: 100%; font-size: 0.9em; cursor: pointer; border-bottom: 1px solid #dce8f5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
      color: #444; transition: 0.2s;
    }
    .convo-item:hover { background: #dce8f5; }
    .convo-item.active { background: #fff; font-weight: bold; color: var(--primary); }
    .new-convo {
      margin: 10px 24px 20px 24px; padding: 12px; border-radius: var(--radius);
      background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer;
    }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; position: relative; }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 24px; border-bottom: 1px solid #e0e7ef; background: #fff;
    }
    .header .title { font-size: 1.2em; font-weight: bold; color: var(--primary); flex: 1; }
    .header .actions { display: flex; gap: 8px; }
    .header .actions button { background: #eee; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; font-size: 0.95em; }
    .header .actions button:hover { background: #e0e7ef; }
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 110px; }
    
    .bubble {
      max-width: 80%; padding: 12px 18px; border-radius: var(--radius);
      font-size: 1.05em; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,0.05); word-break: break-word;
    }
    .bubble.user { align-self: flex-end; background: var(--bubble-user); color: #222; border-bottom-right-radius: 4px; }
    .bubble.ai { align-self: flex-start; background: var(--bubble-ai); color: #222; border-bottom-left-radius: 4px; border: 1px solid #e0e7ef; }

    .input-container { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 20px; pointer-events: none; }
    .input-area {
      width: 100%; max-width: 800px; background: #fff; border: 1px solid #cfe7ff;
      border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow); pointer-events: auto;
    }
    .input-area textarea { flex: 1; border: none; outline: none; padding: 10px; font-size: 1em; resize: none; background: transparent; max-height: 150px; }
    .input-area button { background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; }
    .input-area button:disabled { background: #ccc; }

    @media (max-width: 768px) { .sidebar { display: none; } }
  </style>
</head>
<body>

  <div class="sidebar">
    <div class="logo">Litual AI</div>
    <button class="new-convo" id="newConvoBtn">+ Nouveau Chat</button>
    <div class="convos" id="convoList"></div>
  </div>

  <div class="main">
    <div class="header">
      <span class="title" id="chatTitle">Assistant Intelligence</span>
      <div class="actions">
        <button id="editTitleBtn" title="Renommer">✏️</button>
        <button id="deleteConvoBtn" title="Supprimer">🗑️</button>
      </div>
      <div style="margin-left:12px;"><img src="pdp.png" id="headerProfilePic" style="width:35px;height:35px;border-radius:50%;object-fit:cover;cursor:pointer;"></div>
    </div>
    <div class="chat" id="chat"></div>
    <div class="input-container">
      <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="Demande-moi n'importe quoi..."></textarea>
        <button id="sendBtn" disabled><i class="fas fa-arrow-up"></i></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import {
      getFirestore, collection, addDoc, serverTimestamp, query, orderBy, getDocs, limit, onSnapshot, doc, setDoc
    } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMoFF5b09eiSeQQ_BhSbclmGj3S6zAGXE",
      authDomain: "morgann-music-ai.firebaseapp.com",
      projectId: "morgann-music-ai",
      storageBucket: "morgann-music-ai.appspot.com",
      messagingSenderId: "817825197478",
      appId: "1:817825197478:web:05f7a630b27b1fe8f17367"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    const urlParams = new URLSearchParams(window.location.search);
    let chatId = urlParams.get('id');

    // Si pas d'id dans l'URL, on crée une nouvelle conversation et on redirige
    // Suppression de la création automatique de conversation à l'arrivée sur la page

    const chatContainer = document.getElementById("chat");
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const convoList = document.getElementById("convoList");

    function renderMessage(role, text) {
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "user" : "ai"}`;
      if (role === "ai") {
        // Rendu markdown pour l'IA
        div.innerHTML = window.marked ? marked.parse(text) : text;
      } else {
        div.textContent = text;
      }
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
    }

    // 1. SIDEBAR : Liste des conversations
    function loadSidebar() {
      const q = query(collection(db, "conversations"), orderBy("lastUpdate", "desc"), limit(20));
      onSnapshot(q, (snap) => {
        convoList.innerHTML = "";
        snap.forEach((d) => {
          const btn = document.createElement("button");
          btn.className = "convo-item" + (chatId === d.id ? " active" : "");
          btn.textContent = d.data().title || "Discussion " + d.id.substring(0, 5);
          btn.onclick = () => window.location.href = `?id=${d.id}`;
          convoList.appendChild(btn);
        });
      });
    }

    // Affiche le titre de la conversation (ou le premier message si pas de titre)
    async function updateChatTitle() {
      if (!chatId) return;
      const docRef = doc(db, "conversations", chatId);
      const convoSnap = await getDocs(query(collection(db, "conversations"), orderBy("lastUpdate", "desc"), limit(1)));
      let title = "Assistant Intelligence";
      try {
        const convo = await (await import("https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js")).getDoc(docRef);
        if (convo.exists() && convo.data().title && convo.data().title !== "...") {
          title = convo.data().title;
        } else {
          // Cherche le premier message utilisateur
          const q = query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"), limit(1));
          const snap = await getDocs(q);
          if (!snap.empty) {
            const firstMsg = snap.docs[0].data().text;
            title = firstMsg.substring(0, 50);
          }
        }
      } catch {}
      document.getElementById("chatTitle").textContent = title;
    }

    // 2. MESSAGES : Historique du chat actuel
    async function loadHistory() {
      if (!chatId) return;
      const q = query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"));
      const snap = await getDocs(q);
      chatContainer.innerHTML = "";
      snap.forEach(d => renderMessage(d.data().role, d.data().text));
      updateChatTitle();
    }

    // 3. ENVOI
    async function handleSend() {
      const text = userInput.value.trim();
      if (!text) return;

      let isFirstMessage = false;
      if (!chatId) {
        chatId = "chat_" + Math.random().toString(36).substring(2, 10);
        isFirstMessage = true;
        await setDoc(doc(db, "conversations", chatId), { 
          lastUpdate: serverTimestamp(),
          title: "..." // Titre temporaire
        });
        window.history.replaceState({}, '', `?id=${chatId}`);
      } else {
        await setDoc(doc(db, "conversations", chatId), { lastUpdate: serverTimestamp() }, { merge: true });
      }

      renderMessage('user', text);
      userInput.value = '';
      sendBtn.disabled = true;

      await addDoc(collection(db, "conversations", chatId, "messages"), {
        role: "user", text: text, createdAt: serverTimestamp()
      });

      const loader = document.createElement("div");
      loader.className = "bubble ai"; loader.textContent = "Litual AI réfléchit...";
      chatContainer.appendChild(loader);

      try {
        const q = query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "desc"), limit(6));
        const snap = await getDocs(q);
        const history = snap.docs.reverse().map(d => ({ role: d.data().role === 'user' ? 'user' : 'assistant', content: d.data().text }));

        let aiText = "";
        let aiTitle = null;
        let response;
        if (isFirstMessage) {
          // Demander à l'IA de générer le titre et la réponse
          response = await fetch("https://litual.ai.morgannmusic.uk", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              instruction: "Tu es Litual AI, l'IA de Morgann Rachedi. Morgann Rachedi est compositeur, développeur et entrepreneur a seulement 13. Génère une réponse à ce message et propose un titre de conversation (max 50 caractères, pas de guillemets, pas de ponctuation inutile, pas de phrase complète, juste un titre court et pertinent dans la clé 'title').",
              messages: history
            })
          });
          const data = await response.json();
          aiText = data.response || data.reply || "Erreur serveur";
          aiTitle = data.title;
          if (aiTitle && aiTitle.length > 50) aiTitle = aiTitle.substring(0, 50);
          // Mettre à jour le titre dans Firestore
          await setDoc(doc(db, "conversations", chatId), { title: aiTitle || text.substring(0, 50), lastUpdate: serverTimestamp() }, { merge: true });
        } else {
          response = await fetch("https://litual.ai.morgannmusic.uk", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              instruction: "Tu es Litual AI, l'assistant de Morgann Rachedi.",
              messages: history
            })
          });
          const data = await response.json();
          aiText = data.response || data.reply || "Erreur serveur";
        }
        chatContainer.removeChild(loader);
        renderMessage('ai', aiText);

        await addDoc(collection(db, "conversations", chatId, "messages"), {
          role: "assistant", text: aiText, createdAt: serverTimestamp()
        });
      } catch (err) {
        if (loader.parentNode) chatContainer.removeChild(loader);
        renderMessage('ai', "Erreur de connexion.");
      }
      sendBtn.disabled = false;
    }

    window.addEventListener('DOMContentLoaded', async () => {
      // Authentification anonyme obligatoire pour Firestore
      await new Promise((resolve) => {
        onAuthStateChanged(auth, (user) => {
          if (user) resolve();
          else signInAnonymously(auth).then(resolve);
        });
      });

      // Ne crée plus de conversation automatiquement
      loadSidebar();
      if (chatId) loadHistory();
      // Menu contextuel sur la photo de profil
      document.getElementById('headerProfilePic').onclick = () => {
        window.location.href = 'account.html';
      };
      // Bouton édition/suppression titre
      document.getElementById('editTitleBtn').onclick = async () => {
        const newTitle = prompt('Nouveau titre de la conversation (max 50 caractères) :', document.getElementById('chatTitle').textContent);
        if (newTitle && newTitle.trim()) {
          await setDoc(doc(db, "conversations", chatId), { title: newTitle.trim().substring(0, 50), lastUpdate: serverTimestamp() }, { merge: true });
          updateChatTitle();
        }
      };
      document.getElementById('deleteConvoBtn').onclick = async () => {
        if (confirm('Supprimer cette conversation ?')) {
          await setDoc(doc(db, "conversations", chatId), {}, { merge: false });
          window.location.href = window.location.pathname;
        }
      };
      sendBtn.onclick = handleSend;
      userInput.oninput = () => sendBtn.disabled = !userInput.value.trim();
      userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
      document.getElementById('newConvoBtn').onclick = async () => {
        // Crée une nouvelle conversation et redirige
        const newId = "chat_" + Math.random().toString(36).substring(2, 10);
        await setDoc(doc(db, "conversations", newId), {
          lastUpdate: serverTimestamp(),
          title: "..."
        });
        window.location.href = window.location.pathname + `?id=${newId}`;
      };
    });
  </script>
</body>
</html>
