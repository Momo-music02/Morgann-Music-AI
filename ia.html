<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Litual AI Chat</title>
  <meta name="theme-color" content="#fff5cf">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --primary: #e2a9f1;
      --bg: #fffcf1;
      --sidebar: #fff5cf;
      --bubble-user: #edd6f2;
      --bubble-ai: #fcf0ff;
      --radius: 22px;
      --shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    html, body {
      height: 100%; margin: 0; padding: 0;
      font-family: 'Roboto', Arial, sans-serif;
      background: var(--bg); color: #222; overflow: hidden;
    }
    body { display: flex; }
    
    .sidebar {
      width: 280px; background: var(--sidebar); border-right: 1px solid var(--primary);
      display: flex; flex-direction: column; flex-shrink: 0;
    }
    /* Cacher la sidebar par défaut sur mobile, visible sur desktop */
    @media (max-width: 700px) {
      .sidebar { display: none; }
      .sidebar.mobile-visible { display: flex !important; position: fixed; left: 0; top: 0; bottom: 0; height: 100vh; z-index: 100; width: 90vw; max-width: 320px; transform: translateX(0); box-shadow: 2px 0 10px rgba(0,0,0,0.07); }
    }
    .logo { font-size: 1.5em; font-weight: bold; color: var(--primary); padding: 24px; text-align: center; }
    .convos { flex: 1; overflow-y: auto; padding: 10px 0; }
    
    .convo-item-wrapper { position: relative; margin-bottom: 2px; }
    .convo-item {
      padding: 14px 45px 14px 20px; border: none; background: transparent; text-align: left;
      width: 100%; font-size: 0.9em; cursor: pointer; border-bottom: 1px solid #dce8f5;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: block;
      color: #444; transition: 0.2s;
    }
    .convo-item:hover { background: #dce8f5; }
    .convo-item.active { background: #fff; font-weight: bold; color: var(--primary); }
    
    .convo-actions {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      display: none; gap: 5px;
    }
    .convo-item-wrapper:hover .convo-actions { display: flex; }
    .convo-actions button {
      background: none; border: none; color: #888; cursor: pointer; font-size: 0.85em; padding: 5px;
    }
    .convo-actions button:hover { color: var(--primary); }

    .new-convo {
      margin: 10px 24px 20px 24px; padding: 12px; border-radius: var(--radius);
      background: var(--primary); color: #fff; border: none; font-weight: bold; cursor: pointer;
    }

    .main { flex: 1; display: flex; flex-direction: column; min-width: 0; height: 100vh; position: relative; }
    .header {
      display: flex; align-items: center; gap: 12px;
      padding: 15px 24px; border-bottom: 1px solid var(--primary); background: var(--sidebar);
      position: relative;
    }
    .menu-toggle {
      display: none;
      background: none;
      border: none;
      font-size: 1.7em;
      color: var(--primary);
      margin-right: 10px;
      cursor: pointer;
      z-index: 200;
    }
    @media (max-width: 700px) {
      .menu-toggle { display: block; }
    }
    .header .title { font-size: 1.2em; font-weight: bold; color: var(--primary); flex: 1; display: flex; align-items: center; gap: 10px; }
    
    .chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; padding-bottom: 110px; }
    
    table { border-collapse: collapse; width: 100%; margin: 10px 0; background: #fff; border-radius: 8px; overflow: hidden; }
    th, td { border: 1px solid #e2a9f1; padding: 10px; text-align: left; }
    th { background: #fcf0ff; color: var(--primary); }

    .bubble {
      max-width: 85%; padding: 12px 18px; border-radius: var(--radius);
      font-size: 1.05em; line-height: 1.5; box-shadow: 0 1px 4px rgba(0,0,0,0.05);
      word-wrap: break-word;
    }
    .bubble.user { align-self: flex-end; background: var(--bubble-user); border-bottom-right-radius: 4px; }
    .bubble.ai { align-self: flex-start; background: var(--bubble-ai); border-bottom-left-radius: 4px; border: 1px solid #e0e7ef; }

    .input-container { position: absolute; bottom: 20px; left: 0; right: 0; display: flex; justify-content: center; padding: 0 20px; pointer-events: none; }
    .input-area {
      width: 100%; max-width: 800px; background: #fff; border: 1px solid #cfe7ff;
      border-radius: 30px; padding: 8px 15px; display: flex; align-items: center; gap: 10px;
      box-shadow: var(--shadow); pointer-events: auto;
    }
    .input-area textarea { flex: 1; border: none; outline: none; padding: 10px; font-size: 1em; resize: none; background: transparent; max-height: 150px; }
    .input-area button { background: var(--primary); color: #fff; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; transition: 0.1s; }

    #emptyState { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); text-align: center; }
    .slow-spin { height: 200px; animation: spin 10s linear infinite; }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* Styles pour les badges de sécurité */
.badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 12px;
  border-radius: 12px;
  font-size: 0.85em;
  font-weight: bold;
  margin-bottom: 8px;
  width: fit-content;
}

.badge-medical {
  background: #fff0f0;
  color: #d93025;
  border: 1px solid #ffcfcf;
}

.badge-warning {
  background: #fff4e5;
  color: #663c00;
  border: 1px solid #ffe1bb;
}

.ai-container {
  display: flex;
  flex-direction: column;
  align-self: flex-start;
  max-width: 85%;
}
  </style>
</head>
<body>

  <div class="sidebar" id="sidebarMenu">
    <div class="logo">Litual AI</div>
    <button class="new-convo" id="newConvoBtn">+ Nouveau Chat</button>
    <div class="convos" id="convoList"></div>
  </div>

  <div class="main">
    <div class="header">
      <button class="menu-toggle" id="menuToggleBtn"><i class="fas fa-bars"></i></button>
      <span class="title">
        <a href="/index.html"><img src="o!§ititititt.png" alt="logo" style="height:35px;"></a> 
        <span id="chatTitle">Assistant</span>
      </span>
    </div>

    <div class="chat" id="chat">
        <div id="emptyState">
            <img src="o!§ititititt.png" class="slow-spin">
        </div>
    </div>

    <div class="input-container">
      <div class="input-area">
        <textarea id="userInput" rows="1" placeholder="Ecris ton message..."></textarea>
        <button id="sendBtn"><i class="fas fa-arrow-up"></i></button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script type="module">
    import { initializeApp, getApps } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp, query, orderBy, getDocs, limit, onSnapshot, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";
    import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/12.9.0/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyAMoFF5b09eiSeQQ_BhSbclmGj3S6zAGXE",
      authDomain: "morgann-music-ai.firebaseapp.com",
      projectId: "morgann-music-ai",
      storageBucket: "morgann-music-ai.appspot.com",
      messagingSenderId: "817825197478",
      appId: "1:817825197478:web:05f7a630b27b1fe8f17367"
    };

    const app = getApps().length ? getApps()[0] : initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let chatId = new URLSearchParams(window.location.search).get('id');
    const chatContainer = document.getElementById("chat");
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const chatTitle = document.getElementById('chatTitle');

    marked.setOptions({ breaks: true, gfm: true });

    function renderMessage(role, text) {
      if (document.getElementById("emptyState")) document.getElementById("emptyState").style.display = "none";
      const div = document.createElement("div");
      div.className = `bubble ${role === "user" ? "user" : "ai"}`;
      div.innerHTML = role === "user" ? text : marked.parse(text);
      chatContainer.appendChild(div);
      chatContainer.scrollTop = chatContainer.scrollHeight;
      return div;
    }

async function handleSend() {
  const text = userInput.value.trim();
  if (!text) return;

  // --- LOGIQUE DE FILTRE SENSIBLE ---
  const sensitiveWords = ["porno", "sexe", "xxx", "nude", "drogue", "morphine", "codéine", "fentanyl", "tramadol", "xanax", "valium", "antidépresseur", "anabolisant", "stéroïde", "viagra", "subutex", "méthadone", "psychotrope", "somnifère", "overdose", "seringue", "aiguille", "stupéfiant", "addiction", "dépendance", "overdose", "hallucinogène", "extasy", "héroïne", "cocaïne", "cannabis", "cadavre", "suicide", "meurtre", "sanglant", "mutilation", "décapitation", "assassinat", "viol", "agression", "pédophilie", "hentai", "escort", "prostitution", "orgie", "striptease", "érotique", "inceste", "fétichisme", "sadisme", "masochisme", "exhibitionsme", "voyeurisme", "bite", ]; // Rajoute tes mots ici
  const isSensitive = sensitiveWords.some(word => text.toLowerCase().includes(word));

  if (isSensitive) {
    const container = document.createElement("div");
    container.className = "ai-container";
    container.innerHTML = `
      <div class="badge badge-warning"><i class="fas fa-exclamation-triangle"></i> Contenu restreint</div>
      <div class="bubble ai">Désolé, cette question peut potentiellement être contre nos règles de sécurité.</div>
    `;
    chatContainer.appendChild(container);
    userInput.value = '';
    chatContainer.scrollTop = chatContainer.scrollHeight;
    return; // On arrête tout, on n'envoie rien à l'IA
  }

  // --- LOGIQUE MÉDICALE ---
  const medicalWords = ["mal", "douleur", "maladie", "médicament", "soigner", "docteur", "santé", "symptôme", "diagnostic", "hôpital", "clinique", "seringue", "stéthoscope", "bloc", "brancard", "scanner", "IRM", "pansement", "compresse", "scalpel", "tensiomètre", "thermomètre", "soins", "urgence", "paracétamol", "antibio", "sirop", "gélule", "comprimé", "pommade", "vaccin", "aspirine", "insuline", "vitamine", "collyre", "antidouleur", "ordonnance", "posologie", "générique", "chirurgien", "infirmier", "doc", "interne", "pharmacien", "dentiste", "kiné", "anesthésiste", "sage-femme", "spécialiste", "généraliste", "aide-soignant", "fièvre", "inflammation", "tension", "pouls", "diagnostic", "analyse", "pathologie", "symptôme", "fracture", "entorse", "ordonnance", "traitement", "convalescence"]; // Rajoute tes mots ici
  const isMedical = medicalWords.some(word => text.toLowerCase().includes(word));

  if (!chatId) {
    chatId = "chat_" + Date.now();
    await setDoc(doc(db, "conversations", chatId), { lastUpdate: serverTimestamp(), title: text.substring(0, 30) });
    window.history.replaceState({}, '', `?id=${chatId}`);
  }

  renderMessage('user', text);
  userInput.value = '';
  userInput.style.height = 'auto';

  await addDoc(collection(db, "conversations", chatId, "messages"), { role: "user", text: text, createdAt: serverTimestamp() });

  const historySnap = await getDocs(query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc")));
  const messagesForAI = [];
  historySnap.forEach(doc => {
      messagesForAI.push({ role: doc.data().role === "assistant" ? "assistant" : "user", content: doc.data().text });
  });

  try {
    const response = await fetch("https://litual.ai.morgannmusic.uk", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        instruction: "Tu es Litual. Tu dois être une IA amicale et simple. Utilise le Markdown au plus que tu peux (gras, tableaux, listes, titres). Tu as accès à l'historique de la conversation pour rester cohérent. Ne réponds jamais que par du texte formaté en Markdown, même pour les tableaux ou les listes. Ne réponds jamais par du texte brut sans formatage. Ne réponds jamais par du HTML. Si tu ne connais pas la réponse, excuse toi et dis que tu ne sais pas, n'invente pas de réponse. Reste simple et clair. Tu as été créé par Morgann Rachedi un jeune compositeur/developpeur/entrepreneur de 13 ans. Ton nom est Litual. De la sous-entreprise Litual AI de l'entreprise Morgann AI CP une branche des entreprises de Morgann Rachedi.", // Garde ton instruction actuelle
        messages: messagesForAI
      })
    });

    // Création du container pour pouvoir mettre le badge AU-DESSUS de la bulle
    const container = document.createElement("div");
    container.className = "ai-container";
    
    if (isMedical) {
      container.innerHTML = `<div class="badge badge-medical"><i class="fas fa-user-md"></i> Avis non-médical - Consultez un pro</div>`;
    }
    
    const aiBubble = document.createElement("div");
    aiBubble.className = "bubble ai";
    aiBubble.innerHTML = "...";
    container.appendChild(aiBubble);
    chatContainer.appendChild(container);

    let fullAiText = "";
    const reader = response.body.getReader();
    const decoder = new TextDecoder();

    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      const chunk = decoder.decode(value);
      const lines = chunk.split('\n');
      for (const line of lines) {
        if (line.trim().startsWith('data: ')) {
          try {
            const json = JSON.parse(line.trim().slice(6));
            if (json.response) {
              fullAiText += json.response;
              aiBubble.innerHTML = marked.parse(fullAiText);
              chatContainer.scrollTop = chatContainer.scrollHeight;
            }
          } catch (e) {}
        }
      }
    }
    await addDoc(collection(db, "conversations", chatId, "messages"), { role: "assistant", text: fullAiText, createdAt: serverTimestamp() });
    await updateDoc(doc(db, "conversations", chatId), { lastUpdate: serverTimestamp() });
  } catch (err) {
    renderMessage('ai', "Erreur de connexion.");
  }
}

    window.deleteConvo = async (id) => {
        if(confirm("Supprimer ?")) {
            await deleteDoc(doc(db, "conversations", id));
            if(chatId === id) window.location.href = window.location.pathname;
        }
    };

    window.renameConvo = async (id) => {
        const t = prompt("Nouveau nom :");
        if(t) await updateDoc(doc(db, "conversations", id), { title: t });
    };

    onAuthStateChanged(auth, (u) => {
      if (!u) signInAnonymously(auth);
      else {
          if (chatId) {
            getDocs(query(collection(db, "conversations", chatId, "messages"), orderBy("createdAt", "asc"))).then(snap => {
              chatContainer.innerHTML = "";
              snap.forEach(d => renderMessage(d.data().role, d.data().text));
            });
          }
          onSnapshot(query(collection(db, "conversations"), orderBy("lastUpdate", "desc"), limit(25)), snap => {
            const list = document.getElementById("convoList");
            list.innerHTML = "";
            snap.forEach(d => {
              const wrapper = document.createElement("div");
              wrapper.className = "convo-item-wrapper";
              wrapper.innerHTML = `
                <button class="convo-item ${chatId === d.id ? 'active' : ''}" onclick="window.location.href='?id=${d.id}'">
                    ${d.data().title || "Discussion"}
                </button>
                <div class="convo-actions">
                    <button onclick="renameConvo('${d.id}')"><i class="fas fa-edit"></i></button>
                    <button onclick="deleteConvo('${d.id}')"><i class="fas fa-trash"></i></button>
                </div>
              `;
              list.appendChild(wrapper);
              if (chatId === d.id) chatTitle.textContent = d.data().title || "Assistant";
            });
          });
      }
    });

    sendBtn.onclick = handleSend;
    userInput.onkeydown = (e) => { if(e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); handleSend(); } };
    userInput.oninput = () => { userInput.style.height = 'auto'; userInput.style.height = userInput.scrollHeight + 'px'; };
    document.getElementById('newConvoBtn').onclick = () => window.location.href = window.location.pathname;

    // Menu toggle uniquement sur mobile
    const sidebarMenu = document.getElementById('sidebarMenu');
    const menuToggleBtn = document.getElementById('menuToggleBtn');
    function toggleSidebar() {
      if (sidebarMenu.classList.contains('mobile-visible')) {
        sidebarMenu.classList.remove('mobile-visible');
      } else {
        sidebarMenu.classList.add('mobile-visible');
      }
    }
    if (menuToggleBtn) menuToggleBtn.addEventListener('click', function(e) {
      if (window.innerWidth <= 700) {
        e.stopPropagation();
        toggleSidebar();
      }
    });
    // Fermer le menu si on clique en dehors sur mobile
    document.addEventListener('click', function(e) {
      if (window.innerWidth <= 700) {
        if (!sidebarMenu.contains(e.target) && !menuToggleBtn.contains(e.target)) {
          sidebarMenu.classList.remove('mobile-visible');
        }
      }
    });
  </script>
</body>
</html>
